name: Lint

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: shellcheck
        run: shellcheck scripts/*.sh
