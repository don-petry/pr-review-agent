name: Lint

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: shellcheck
        run: shellcheck scripts/fleet_monitor.sh scripts/fleet_report.sh

  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/fleet_report.bats
