name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run copilot_chat tests
        run: bash tests/test_copilot_chat.sh

      - name: Run list-prs sort tests
        run: bash tests/test_list_prs_sort.sh
