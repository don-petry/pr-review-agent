name: Backfill PR Approvals

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true) or apply approvals (false)"
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: petry-projects

      - name: Backfill approvals
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash scripts/backfill-approvals.sh "${{ inputs.dry_run }}"
