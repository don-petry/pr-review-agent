name: Backfill PR Approvals

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true) or apply approvals (false)"
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Backfill approvals
        env:
          GH_TOKEN: ${{ secrets.DON_PETRY_BOT_PETRY_PROJECT_PAT }}
        run: bash scripts/backfill-approvals.sh "${{ inputs.dry_run }}"
