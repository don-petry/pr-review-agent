name: Actions Fleet Monitor

on:
  schedule:
    # Daily at 6:00 UTC — covers same-day run history before US work hours
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub org to scan"
        required: false
        default: "petry-projects"
        type: string
      lookback_days:
        description: "Days of run history to inspect"
        required: false
        default: "1"
        type: string
  workflow_call:
    inputs:
      org:
        description: "GitHub org to scan"
        required: false
        default: "petry-projects"
        type: string
      lookback_days:
        description: "Days of run history to inspect"
        required: false
        default: "1"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: actions-fleet-monitor-${{ inputs.org || 'petry-projects' }}
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ORG: ${{ inputs.org || 'petry-projects' }}
      LOOKBACK_DAYS: ${{ inputs.lookback_days || '1' }}

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run fleet monitor
        env:
          GH_TOKEN: ${{ secrets.DON_PETRY_BOT_GH_PAT }}
        run: bash scripts/fleet_monitor.sh

      - name: Create issue with findings
        if: env.HAS_FAILURES == 'true' && hashFiles('fleet_monitor_report.md') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('fleet_monitor_report.md', 'utf8');
            if (!report.trim()) {
              core.setFailed('Report file is empty');
              return;
            }
            const today = new Date().toISOString().split('T')[0];
            const org = process.env.ORG;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${org} — workflow failures detected ${today}`,
              body: report,
              labels: ['health-check', 'automated-report'],
            });
            core.notice(`Issue created: ${issue.data.html_url}`);

      - name: Annotate clean run
        if: env.HAS_FAILURES != 'true'
        run: |
          echo "::notice::Fleet monitor passed — all workflows in ${ORG} are healthy over the last ${LOOKBACK_DAYS} day(s)."
