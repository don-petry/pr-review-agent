name: Fix Stuck PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true) or apply fixes (false)"
        required: false
        default: "true"
        type: string

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fix stuck PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          bash scripts/fix-stuck-prs.sh "${{ inputs.dry_run }}"
