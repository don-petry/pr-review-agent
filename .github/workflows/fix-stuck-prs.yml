name: Fix Stuck PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true) or apply fixes (false)"
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix stuck PRs
        env:
          GH_TOKEN: ${{ secrets.DON_PETRY_BOT_PETRY_PROJECT_PAT }}
        run: |
          bash scripts/fix-stuck-prs.sh "${{ inputs.dry_run }}"
