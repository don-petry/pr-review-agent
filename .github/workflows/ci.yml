# CI pipeline for the .github-private repository.
# Lints markdown, YAML, GitHub Actions, and shell scripts; runs AgentShield; scans for secrets.
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: '**/*.md'

      - name: Lint YAML
        run: |
          pip install --quiet --only-binary :all: "yamllint==1.38.0"
          yamllint -c <(cat <<'YAMLLINTRC'
          extends: default
          rules:
            line-length:
              max: 250
            truthy:
              check-keys: false
            document-start: disable
            comments:
              min-spaces-from-content: 1
          YAMLLINTRC
          ) .github/workflows/

      - name: Lint GitHub Actions
        run: |
          # Install actionlint via verified download (pinned version + checksum)
          ACTIONLINT_VERSION="1.7.7"
          ACTIONLINT_SHA="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          curl --fail --location --retry 3 --retry-delay 5 -so actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          rm actionlint.tar.gz
          ./actionlint -ignore 'SC2129' .github/workflows/*.yml

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        run: |
          # Recurse so subdirectories like scripts/lib/ (sourceable libraries)
          # are linted too. -x follows `# shellcheck source=...` directives.
          shopt -s globstar nullglob
          shell_files=(scripts/**/*.sh)
          if [ ${#shell_files[@]} -gt 0 ]; then
            shellcheck --severity=warning -x "${shell_files[@]}"
          else
            echo "No shell scripts found — skipping"
          fi

  agent-security:
    name: Agent Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run AgentShield
        run: |
          npx --yes --ignore-scripts ecc-agentshield@1.4.0 scan --path . --format json --min-severity high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          args: detect --source . --redact --verbose --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
