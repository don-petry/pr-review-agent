name: Repair PR Approvals

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true) or apply repairs (false)"
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Repair PR approvals
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: bash scripts/repair-pr-approvals.sh "${{ inputs.dry_run }}"
