name: PR Review Agent

on:
  schedule:
    # Hourly at :07 to avoid the top-of-hour cron stampede
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Optional: review a single PR URL instead of enumerating"
        required: false
        type: string
      dry_run:
        description: "If true, never submit reviews or comments"
        required: false
        default: "false"
        type: string

permissions:
  contents: read

concurrency:
  group: pr-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GH_PAT is a fine-grained PAT with PR read/write across the repos you
      # want the agent to act on. Stored as a repo secret.
      GH_TOKEN: ${{ secrets.GH_PAT }}
      # Routes Claude Code through the Max plan subscription instead of
      # per-token API billing. Generate with `claude setup-token` locally.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Default to dry-run unless the repo variable LIVE_MODE is set to 'true'.
      # Manual workflow_dispatch can override either way via the dry_run input.
      # To go live: gh variable set LIVE_MODE --body true --repo don-petry/self
      DRY_RUN: ${{ inputs.dry_run || (vars.LIVE_MODE == 'true' && 'false' || 'true') }}
      PR_URL_OVERRIDE: ${{ inputs.pr_url }}

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v5

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify auth
        run: |
          gh auth status
          gh api user --jq '.login'

      - name: Enumerate candidate PRs
        id: list
        env:
          # Cap how many PRs one cron tick reviews to stay within timeout.
          # Override via repo variable: gh variable set MAX_PRS --body 20 --repo don-petry/self
          MAX_PRS: ${{ vars.MAX_PRS || '10' }}
        run: |
          set -euo pipefail
          if [ -n "${PR_URL_OVERRIDE}" ]; then
            echo "${PR_URL_OVERRIDE}" > prs.txt
          else
            bash scripts/list-prs.sh | head -n "$MAX_PRS" > prs.txt
          fi
          echo "count=$(wc -l < prs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "--- candidate PRs (max $MAX_PRS) ---"
          cat prs.txt || true

      - name: Review each PR (council + synth)
        if: steps.list.outputs.count != '0'
        run: |
          set -euo pipefail
          while IFS= read -r pr_url; do
            [ -z "$pr_url" ] && continue
            echo "::group::Reviewing $pr_url"
            bash scripts/review-one-pr.sh "$pr_url" \
              || echo "::warning::Review failed for $pr_url"
            echo "::endgroup::"
          done < prs.txt
