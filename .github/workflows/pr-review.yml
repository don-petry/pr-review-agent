name: PR Review Agent

on:
  schedule:
    # Hourly at :07 to avoid the top-of-hour cron stampede
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Optional: review a single PR URL instead of enumerating"
        required: false
        type: string
      dry_run:
        description: "If true, never submit reviews or comments"
        required: false
        default: "false"
        type: string

permissions:
  contents: read

concurrency:
  group: pr-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GH_PAT is a fine-grained PAT with PR read/write across the repos you
      # want the agent to act on. Stored as a repo secret.
      GH_TOKEN: ${{ secrets.GH_PAT }}
      # Review engine: "claude" or "copilot". Controls which CLI and models are used.
      # gh variable set REVIEW_ENGINE --body copilot --repo don-petry/self
      REVIEW_ENGINE: ${{ vars.REVIEW_ENGINE || 'claude' }}
      # Claude engine auth — routes through Max plan subscription.
      # Generate with `claude setup-token`, store as repo secret.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Copilot engine auth — GitHub PAT with Copilot scope.
      # Store as repo secret: gh secret set COPILOT_GITHUB_TOKEN --repo don-petry/self
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      # Default to dry-run unless the repo variable LIVE_MODE is set to 'true'.
      # Manual workflow_dispatch can override either way via the dry_run input.
      # To go live: gh variable set LIVE_MODE --body true --repo don-petry/self
      DRY_RUN: ${{ inputs.dry_run || (vars.LIVE_MODE == 'true' && 'false' || 'true') }}
      PR_URL_OVERRIDE: ${{ inputs.pr_url }}
      # Comma-separated list of GitHub orgs where AI delegation is enabled.
      # When findings exist, the agent posts fix-request comments for AI to act on.
      # gh variable set DELEGATION_ORGS --body "petry-projects,don-petry" --repo don-petry/self
      DELEGATION_ORGS: ${{ vars.DELEGATION_ORGS || vars.CLAUDE_ORGS || '' }}
      # Max review cycles before stopping AI delegation and escalating to human.
      MAX_REVIEW_CYCLES: ${{ vars.MAX_REVIEW_CYCLES || '3' }}

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v5

      - name: Install review engine CLIs
        run: |
          # Install both engines — the primary runs the cascade, the opposite
          # engine runs the adversarial "rubber duck" review in parallel.
          npm install -g @anthropic-ai/claude-code || true
          gh extension install github/gh-copilot || true

      - name: Verify auth
        run: |
          gh auth status
          gh api user --jq '.login'

      - name: Enumerate candidate PRs
        id: list
        env:
          # Cap how many PRs one cron tick reviews to stay within timeout.
          # Override via repo variable: gh variable set MAX_PRS --body 20 --repo don-petry/self
          MAX_PRS: ${{ vars.MAX_PRS || '10' }}
        run: |
          set -euo pipefail
          if [ -n "${PR_URL_OVERRIDE}" ]; then
            echo "${PR_URL_OVERRIDE}" > prs.txt
          else
            bash scripts/list-prs.sh > prs_all.txt
            TOTAL=$(wc -l < prs_all.txt | tr -d ' ')
            head -n "$MAX_PRS" prs_all.txt > prs.txt
            if [ "$TOTAL" -gt "$MAX_PRS" ]; then
              echo "::notice::Backlog has $TOTAL PRs but MAX_PRS=$MAX_PRS — reviewing first $MAX_PRS only. Remaining will be picked up in subsequent runs."
            fi
          fi
          echo "count=$(wc -l < prs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "--- candidate PRs (max $MAX_PRS) ---"
          cat prs.txt || true

      - name: Review each PR (cascade)
        if: steps.list.outputs.count != '0'
        run: |
          set -euo pipefail
          while IFS= read -r pr_url; do
            [ -z "$pr_url" ] && continue
            echo "::group::Reviewing $pr_url"
            bash scripts/review-one-pr.sh "$pr_url" \
              || echo "::warning::Review failed for $pr_url"
            echo "::endgroup::"
          done < prs.txt
