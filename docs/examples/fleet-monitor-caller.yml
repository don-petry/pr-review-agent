# fleet-monitor-caller.yml — copy into .github/workflows/ of any repo
# that participates in the Actions Fleet Monitor.
#
# Requirements:
#   - DON_PETRY_BOT_GH_PAT must be available as an org secret (it is).
#   - Set workflow_file to the filename of the workflow you want to monitor.
#
name: Actions Fleet Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of run history to inspect"
        required: false
        default: "1"
        type: string

jobs:
  monitor:
    uses: petry-projects/.github-private/.github/workflows/actions-fleet-monitor.yml@main
    with:
      workflow_repo: ${{ github.repository }}
      workflow_file: my-workflow.yml   # <-- change to the workflow you want to monitor
      lookback_days: ${{ inputs.lookback_days || '1' }}
    secrets: inherit
